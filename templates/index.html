<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shazylist - DJ Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- SVG Sprite -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <symbol id="icon-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></symbol>
        <symbol id="icon-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3"></path><path d="M12 15v5s3.03-.55 5-2c2.2-1.62 3-5 3-5"></path></symbol>
        <symbol id="icon-solo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></symbol>
        <symbol id="icon-flame" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></symbol>
        <symbol id="icon-sort" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 15 5 5 5-5"></path><path d="m7 9 5-5 5 5"></path></symbol>
        <symbol id="icon-sort-asc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"></path></symbol>
        <symbol id="icon-sort-desc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></symbol>
        <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></symbol>
        <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></symbol>
        <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></symbol>
        <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></symbol>
        <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>
    </svg>

    <header class="sticky-header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <svg class="icon-svg"><use xlink:href="#icon-logo"></use></svg>
                    <h1>Shazylist</h1>
                </div>
                <div class="header-right">
                    <button id="settings-toggle" class="icon-btn-ui" title="Réglages Scan Local">
                        <svg class="icon-svg"><use xlink:href="#icon-settings"></use></svg>
                    </button>
                    <button id="theme-toggle" class="icon-btn-ui" title="Changer de thème">
                        <svg class="icon-svg"><use xlink:href="#icon-sun"></use></svg>
                    </button>
                    <div class="status" id="status">Chargement...</div>
                    <div class="actions">
                        <a href="/export/csv" class="btn-export">CSV</a>
                        <a href="/export/txt" class="btn-export">TXT</a>
                    </div>
                </div>
            </div>
            
            <div class="header-bottom">
                <div class="search-box">
                    <input type="text" id="search" placeholder="Artiste, titre...">
                </div>
                <div class="date-filters">
                    <div class="input-group">
                        <label>Du</label>
                        <input type="date" id="date-start">
                    </div>
                    <div class="input-group">
                        <label>Au</label>
                        <input type="date" id="date-end">
                    </div>
                    <div class="date-shortcuts">
                        <button class="shortcut-btn" data-range="today">Aujourd'hui</button>
                        <button class="shortcut-btn" data-range="yesterday">Hier</button>
                        <button class="shortcut-btn" data-range="week">Semaine</button>
                        <button class="shortcut-btn" data-range="all">Tout</button>
                    </div>
                </div>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">Tous</button>
                    <button class="filter-btn" data-filter="auto">
                        <svg class="icon-btn"><use xlink:href="#icon-auto"></use></svg> Auto
                    </button>
                    <button class="filter-btn" data-filter="manual">
                        <svg class="icon-btn"><use xlink:href="#icon-solo"></use></svg> Solo
                    </button>
                    <div class="filter-divider"></div>
                    <label class="checkbox-filter">
                        <input type="checkbox" id="hide-owned"> Cacher possédés
                    </label>
                </div>

            <div class="stats-bar" id="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Total :</span>
                    <span class="stat-value" id="stat-total">-</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Top Artiste :</span>
                    <span class="stat-value" id="stat-artist">-</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Ratio Auto :</span>
                    <span class="stat-value" id="stat-ratio">-</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="table-container">
            <table id="tracks-table">
                <thead>
                    <tr>
                        <th class="sortable" data-sort="date">
                            Date <svg class="icon-sort"><use xlink:href="#icon-sort"></use></svg>
                        </th>
                        <th class="sortable" data-sort="hits">
                            Hits <svg class="icon-sort"><use xlink:href="#icon-sort"></use></svg>
                        </th>
                        <th>Cover</th>
                        <th>Artiste / Titre</th>
                        <th>Genre</th>
                        <th>Recherche</th>
                    </tr>
                </thead>
                <tbody id="tracks-body">
                    <!-- Les morceaux seront insérés ici par JS -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal Réglages -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Réglages Scan Local</h2>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <p class="settings-desc">Ajoutez vos dossiers de musique pour identifier les Shazams que vous possédez déjà.</p>
                <div id="folder-list" class="folder-list">
                    <!-- Liste des dossiers injectée ici -->
                </div>
                <div class="add-folder-box">
                    <input type="text" id="new-folder-path" placeholder="/Chemin/vers/ma/musique">
                    <button id="pick-folder-btn" class="btn-secondary" title="Parcourir...">
                        📂
                    </button>
                    <button id="add-folder-btn" class="btn-primary">
                        <svg class="icon-btn"><use xlink:href="#icon-plus"></use></svg> Ajouter
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="btn-save">Enregistrer & Scanner</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Shazylist.</p>
    </footer>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
